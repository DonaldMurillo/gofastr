# Migration registry for `gofastr upgrade`.
#
# One entry per release that carries migration-relevant changes (usually
# BREAKING entries from CHANGELOG.md — keep the prose here actionable, the
# full story lives in the changelog/release notes). The CLI shows every
# entry in (current, target] when a project upgrades, and runs each note's
# optional `detect` regex over the project's .go files to point at the
# exact lines that need attention.
#
# Fields per release: version (vX.Y.Z), title.
# Fields per note: change (one line), breaking (bool), guidance (one
# line — this parser has no block scalars), detect (optional Go regex
# applied per-line to non-test .go files).
#
# Maintenance rule: EVERY release PR bumps `through` below; a release
# that lands BREAKING changes also adds its entry under `releases`
# (same policy as CHANGELOG.md).

# The registry is complete through this release: releases ≤ through
# with no entry below genuinely had no migration-relevant changes.
# Targets beyond it make the CLI warn that it may be out of date.
through: v0.34.0

releases:
  - version: v0.3.0
    title: Secure-by-default sweep
    notes:
      - change: Tenant scoping and multi-tenant CRUD are fail-closed
        breaking: true
        guidance: "Typed-repo queries and HTTP CRUD now refuse to run without a tenant in context when an entity is tenant-scoped. If reads started returning empty/403 after upgrading, install the tenant middleware or mark the entity non-tenant."
      - change: Admin battery is default-deny for non-admins
        breaking: true
        guidance: "battery/admin now requires the admin role by default. Set AdminRole (and grant it) or provide a custom policy."
      - change: Escape-hatch field Attrs renamed to ExtraAttrs
        breaking: true
        guidance: "Every core-ui/html, core-ui/patterns, and framework/ui Config that exposed a raw attribute bag renamed Attrs to ExtraAttrs. Compile errors point at each use; rename the field."
      - change: Form intercept is opt-in
        breaking: true
        guidance: "runtime.js no longer intercepts plain-enctype forms; browsers submit them natively. Forms posting to JSON endpoints need enctype=\"application/json\" (or data-fui-spa)."
      - change: Legacy /__gofastr compat endpoints removed
        breaking: true
        guidance: "theme.css / styles.css / routes.js / catalog.js now 404. Use /__gofastr/app.css; routes + catalog ship inline in the SSR page."
        detect: '/__gofastr/(theme|styles)\.css|/__gofastr/(routes|catalog)\.js'
      - change: RenderPage / RenderPartial wrap richer *Result variants
        breaking: true
        guidance: "core-ui/app.App.RenderPage and RenderPartial return an error for Redirect/Block policy decisions instead of inline HTML; callers that consumed the raw string switch to the *Result variants."
      - change: Router.Render renamed to Router.RenderRaw; App.RenderScreen to App.RenderScreenRaw
        breaking: true
        guidance: "The renames call out that the raw variants bypass policies and layouts. Mechanical rename at each call site."
        detect: 'Router\.Render\(|\.RenderScreen\('
      - change: Screen.Policies field unexported
        breaking: true
        guidance: "Use Screen.WithPolicy(p) to add a policy and Screen.PolicyChain() to read a copy; direct field access no longer compiles."
        detect: '\.Policies\b'
      - change: Access control installs via framework.WithAccessControl / AccessMiddleware
        breaking: true
        guidance: "Policy + roles install in one line via the new helpers; hand-wired policy plumbing from v0.2 needs the new install path."
  - version: v0.4.0
    title: Declaration-driven entities
    notes:
      - change: Legacy entities/*.json declaration format removed
        breaking: true
        guidance: "Declare entities in Go (framework/entity.EntityDeclaration) or a blueprint. `gofastr generate` emits the Go form; JSON files are no longer read."
  - version: v0.5.0
    title: Auth hardening
    notes:
      - change: battery/auth fails closed on an empty JWTSecret in production
        breaking: true
        guidance: "Set JWT_SECRET (or auth.Config.JWTSecret) in production — startup now refuses a blank secret instead of minting unverifiable tokens."
  - version: v0.6.0
    title: Generator ownership model
    notes:
      - change: gofastr generate scaffolds into the module root, not gen/
        breaking: true
        guidance: "Generated files land next to your code and are add-only afterwards. Move any custom code out of gen/ and re-run generate once."
      - change: gofastr migrate diff removed
        breaking: true
        guidance: "Use `gofastr migrate generate` for versioned migrations; dev-mode auto-migrate covers the inner loop."
  - version: v0.11.0
    title: Multi-replica + security remediation
    notes:
      - change: battery/admin exposure is opt-in
        breaking: true
        guidance: "An app that registered the admin battery implicitly no longer serves it; register it explicitly with a Config."
  - version: v0.12.0
    title: Blueprint output layout
    notes:
      - change: gofastr generate emits a flat package main
        breaking: true
        guidance: "Regenerated blueprint apps are one flat package. Existing multi-package generated apps keep working; regeneration adopts the flat layout."
  - version: v0.13.0
    title: Component correctness
    notes:
      - change: Unknown component variants panic at build time
        breaking: true
        guidance: "ui.Card / ui.ToggleAction (like ui.Button) now reject unregistered variant names at screen construction. Fix the typo or register the custom variant before first use."
      - change: html.Button requires a label
        breaking: true
        guidance: "An empty Label with no aria-label now panics at build time. Icon-only buttons pass ExtraAttrs aria-label — `gofastr audit a11y` finds these statically."
      - change: Plain modals paint a real panel
        breaking: true
        guidance: "preset.Modal slots now render inside .fui-panel (surface, border, padding). Bodies that own their chrome opt out with .fui-slot-bare; selectors targeting .fui-pos-center > .fui-slot move to .fui-panel."
        detect: 'fui-pos-center'
  - version: v0.16.0
    title: Multi-replica outbox
    notes:
      - change: Transactional outbox delivers per-consumer
        breaking: true
        guidance: "Outbox rows are tracked per consumer instead of globally; existing single-consumer apps are unaffected, multi-consumer handlers each get their own cursor. Review handlers that assumed at-most-once fan-out."
  - version: v0.21.0
    title: Multi-replica auth durability
    notes:
      - change: Production mode refuses the in-memory 2FA store
        breaking: true
        guidance: "Two-factor state must be durable in production — configure the DB-backed store (the default when auth has a DB) or an explicit store; startup fails closed otherwise."
  - version: v0.23.0
    title: AI-native UI composition
    notes:
      - change: theme.Default() is now adaptive
        breaking: true
        guidance: "The canonical theme now adapts light/dark from one palette. Apps that overrode dozens of tokens to fake dark mode can delete those overrides; apps that relied on the old static values re-pin them via theme.Overrides."
        detect: 'theme\.Default\('
      - change: SiteHeader wraps its Brand slot
        breaking: true
        guidance: "Brand renders inside a framework-owned wrapper; CSS targeting the raw brand element needs the new wrapper class (or better, drop the CSS — the wrapper is styled)."
      - change: ui.Cluster zero value now wraps
        breaking: true
        guidance: "Clusters wrap whole items by default. Layouts that depended on single-line overflow set NoWrap: true."
  - version: v0.26.0
    title: Technical SEO + enforced accessibility
    notes:
      - change: gofastr build enforces the static accessibility lint
        breaking: false
        guidance: "Builds now fail on missing required a11y fields in core-ui/html element configs (Alt on images, Label on buttons/landmarks, Legend, For, …) with a guided fix hint per finding. Icon-only buttons with ExtraAttrs aria-label pass. Fix the findings (see gofastr docs accessibility) or skip once with --no-a11y."
  - version: v0.27.0
    title: Dev-loop cwd + cmd/ layouts
    notes:
      - change: gofastr dev runs the server with --dir as its working directory
        breaking: false
        guidance: "Relative paths (sqlite db_url, static dirs) now resolve against the project directory instead of wherever gofastr dev was launched. If your sqlite file seems to have vanished after upgrading, it was being created at the launch cwd — point db_url at the old file or move it into the project."
  - version: v0.29.0
    title: Secure-by-default CRUD + unified response envelope
    notes:
      - change: Auto-CRUD and entity MCP tools require an authenticated session by default
        breaking: true
        guidance: "An entity declaring none of owner_field, access, or the new public: true now refuses anonymous requests with 401 across List/Get/Create/Update/Delete (and its MCP tools). Add public: true (EntityConfig.Public) for genuinely public entities, or owner_field/access for scoped ones. Existing apps relying on anonymous CRUD will start returning 401 until an entity opts out."
        detect: "app\\.Entity\\(|EntityConfig\\{"
      - change: Single-record CRUD responses use the {\"data\":{...}} envelope
        breaking: true
        guidance: "Create/Get/PUT/PATCH now wrap the record as {\"data\":{...}}, matching list's {\"data\":[...]}; errors and DELETE are unchanged. Update any hand-written client that decoded the bare object — the generated typed clients already unwrap it. New PATCH /<entity>/{id} verb added for sparse updates (generated clients gain a pointer-based <Entity>Patch)."
  - version: v0.30.0
    title: Access registry + decider, stored routines, background compute
    notes:
      - change: RolePolicy.Grant returns error
        breaking: false
        guidance: "Grant now reports strict-mode capability rejections. Statement-form calls keep compiling; error-checking linters will flag the ignored return. With StrictCapabilities() configured, handle the error — errors.As with *access.UnknownCapabilityError distinguishes a typo'd capability (answer 400) from a store failure (500)."
        detect: '\.Grant\('
      - change: Same-container sortable commits include container=
        breaking: false
        guidance: "Sortable lists that configure Container now send container=<id> on same-container reorders too (previously cross-container only). Handlers that distinguished the two cases by container's presence should key on moved= instead — it remains cross-container-only."
        detect: 'sortablelist\.Config\{'
      - change: gofastr_routines ledger table auto-created
        breaking: false
        guidance: "Apps registering stored routines (App.Routine / the new App.RoutinesFS) gain a gofastr_routines bookkeeping table on next boot, created inside the migration transaction. Reporting-only — every routine Up still runs each boot; no action needed."
  - version: v0.31.0
    title: Process-isolated modules + cross-replica presence
    notes:
      - change: mcpclient.Spawn scrubs the child environment
        breaking: true
        guidance: "Spawned MCP-server children no longer inherit the full host environment (JWT_SECRET, DB DSN, OAUTH_* all leaked before). If a child needs a host variable, pass it explicitly via the new SpawnConfig{Env, InheritEnv} — the default is now a minimal allowlist (PATH/HOME/TMPDIR/locale)."
        detect: 'mcpclient\.Spawn\('
      - change: Process-isolated third-party modules (#37)
        breaking: false
        guidance: "New App.RegisterProcessModule surface: third-party modules run out-of-process behind core/moduleproto, capability-brokered, sandbox-gated. Additive — existing in-process modules (App.RegisterModule) are unaffected. Untrusted-tier modules require a conforming sandbox backend or they fail closed (never run)."
      - change: Cross-replica presence over fanout (#47)
        breaking: false
        guidance: "Presence rosters now aggregate across serve replicas when WithFanout is configured (dedicated gofastr.presence lane). Additive: single-replica behavior is byte-identical with no fanout."
  - version: v0.32.0
    title: Customer-facing CLI generation
    notes:
      - change: gofastr generate cli (#85)
        breaking: false
        guidance: "New generator: run from an app root to emit a standalone customer CLI under cli/ wrapping the app's entities/client package — CRUD, batch, SSE watch, scoped-token login. Additive; custom.go is the dev-owned extension seam and survives --force regens."
      - change: auth.RequireAPIScopes blanket scope gate
        breaking: false
        guidance: "Minted API-token scopes were advisory unless per-route RequireScope was mounted. Mount auth.RequireAPIScopes(\"/api\") after TokenMiddleware to enforce them across the auto-CRUD tree; sessions and off-prefix paths are untouched. Additive — but hosts that mint scoped tokens should adopt it."
      - change: Generated typed client grows Token, batch, Watch, and Do
        breaking: false
        guidance: "entities/client gains an opt-in Token field (Authorization: Bearer), BatchCreate/BatchUpdate/BatchDelete<Entity>, Watch<Entity> (SSE), and a raw Do escape hatch. Regenerate the client (gofastr generate --force from your blueprint, or re-run pack+generate) to pick them up; existing call sites keep compiling."
