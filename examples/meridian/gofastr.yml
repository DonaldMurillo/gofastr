# =============================================================================
# Meridian — SaaS billing & revenue console (GoFastr flagship demo)
#
# A believable product: a public marketing site + an authenticated billing
# console (customers, subscriptions, invoices with real status workflows, MRR
# metrics, live activity) + an admin back-office. Generated entirely from this
# one blueprint. Design: calm, light, refined (Stripe/Notion).
#
# NOTE: this blueprint is the TARGET SPEC — some block kinds / features used
# here are being built into the generator (server-rendered entity screens,
# the full framework/ui block catalog, marketing layout, auth/RBAC). It is
# authored first so the product is concrete; the generator is made to render it.
# =============================================================================

app:
  name: Meridian
  module: github.com/DonaldMurillo/gofastr/examples/meridian
  api_prefix: api
  static_dir: static
  db:
    driver: sqlite
    url: file:meridian.db
  auth:
    enabled: true
    dev_mode: true
  admin:
    enabled: true
    path: /admin
    role: admin
    login_path: /login
    seed_email: admin@meridian.dev
    seed_password: change-me-now-123
  # Calm, light, refined — warm paper, ink text, one confident indigo accent.
  theme:
    # Type: a distinctive editorial display face (Bricolage Grotesque) for
    # headings + a warm humanist grotesk (Hanken Grotesk) with true tabular
    # figures for body/data. The display face gives titles real character so
    # the hierarchy reads as designed, not default-bold.
    font_heading: Bricolage Grotesque
    font_body: Hanken Grotesk
    background: "#F8F7F4"
    surface: "#FFFFFF"
    surface-soft: "#F2F1EC"
    text: "#1B1B2A"
    text-muted: "#65657A"
    text-subtle: "#9A9AAB"
    border: "#E7E5DF"
    border-strong: "#33334A"
    primary: "#4338CA"
    primary-fg: "#FFFFFF"
    secondary: "#0E7C86"
    accent: "#4338CA"
    success: "#15803D"
    warning: "#B45309"
    danger: "#B42318"
    info: "#1D4ED8"
    # Dark scheme — a calm warm-charcoal tinted toward the indigo brand hue.
    # The header's theme toggle flips to this; every surface that reads the
    # --color-* tokens (marketing, app, components) recolors from one place.
    dark:
      background: "#15141B"
      surface: "#1F1D27"
      surface-soft: "#29262F"
      text: "#ECEAF3"
      text-muted: "#A29FB0"
      text-subtle: "#726F80"
      border: "#322E3D"
      border-strong: "#494457"
      primary: "#8B80F2"
      primary-fg: "#15141B"
      secondary: "#2DD4BF"
      accent: "#8B80F2"
      success: "#4ADE80"
      warning: "#FBBF24"
      danger: "#F87171"
      info: "#60A5FA"

# =============================================================================
# DATA MODEL — the revenue domain: plans → subscriptions ← customers,
# invoices, payments. Status enums are the real workflows the operator drives.
# =============================================================================

entities:

  - name: plans
    crud: true
    mcp: true
    properties:
      label: Plans
    fields:
      - name: name
        type: string
        required: true
        max: 80
      - name: slug
        type: string
        required: true
        unique: true
        max: 80
      - name: price
        type: decimal
        required: true
        min: 0
      - name: interval
        type: enum
        values: [month, year]
        default: month
      - name: active
        type: bool
        default: true

  - name: customers
    crud: true
    mcp: true
    owner_field: user_id    # per-user: each signed-in account owns its own customers
    properties:
      label: Customers
    indices:
      - name: idx_customers_email
        columns: [email]
        unique: true
    fields:
      - name: name
        type: string
        required: true
        max: 120
      - name: email
        type: string
        required: true
        unique: true
      - name: company
        type: string
        max: 120
      - name: status
        type: enum
        values: [trialing, active, past_due, canceled]
        default: trialing
      - name: mrr
        type: decimal
        min: 0
        default: "0"

  - name: subscriptions
    crud: true
    mcp: true
    owner_field: user_id
    properties:
      label: Subscriptions
    fields:
      - name: customer_id
        type: relation
        to: customers
        required: true
      - name: plan_id
        type: relation
        to: plans
        required: true
      - name: status
        type: enum
        values: [trialing, active, past_due, canceled]
        default: trialing
      - name: mrr
        type: decimal
        min: 0
        default: "0"
      - name: started_on
        type: date
      - name: renews_on
        type: date
    relations:
      - type: belongs_to
        name: customer
        entity: customers
        foreign_key: customer_id
      - type: belongs_to
        name: plan
        entity: plans
        foreign_key: plan_id

  - name: invoices
    crud: true
    mcp: true
    owner_field: user_id
    properties:
      label: Invoices
    fields:
      - name: customer_id
        type: relation
        to: customers
        required: true
      - name: number
        type: string
        required: true
        unique: true
      - name: amount
        type: decimal
        required: true
        min: 0
      - name: status
        type: enum
        values: [draft, open, paid, past_due, void]
        default: draft
      - name: issued_on
        type: date
      - name: due_on
        type: date
      - name: paid_on
        type: date
    relations:
      - type: belongs_to
        name: customer
        entity: customers
        foreign_key: customer_id

  - name: payments
    crud: true
    mcp: true
    owner_field: user_id
    properties:
      label: Payments
    fields:
      - name: invoice_id
        type: relation
        to: invoices
        required: true
      - name: customer_id
        type: relation
        to: customers
        required: true
      - name: amount
        type: decimal
        required: true
        min: 0
      - name: method
        type: enum
        values: [card, ach, wire]
        default: card
      - name: status
        type: enum
        values: [succeeded, failed, refunded]
        default: succeeded
    relations:
      - type: belongs_to
        name: invoice
        entity: invoices
        foreign_key: invoice_id
      - type: belongs_to
        name: customer
        entity: customers
        foreign_key: customer_id

# =============================================================================
# SCREENS — three layers, two layouts:
#   layout: marketing  → public site (SiteHeader + SiteFooter)
#   layout: app        → authenticated console (sidebar shell), access-gated
# =============================================================================

screens:

  # ---- Public marketing site -------------------------------------------------
  - name: home
    route: /
    layout: marketing
    title: Meridian — billing that runs itself
    description: The revenue console for modern SaaS.
    body:
      - kind: hero
        props:
          eyebrow: Billing & revenue
          title: See your revenue the moment it moves.
          subtitle: Meridian gives SaaS teams one calm place to manage customers, subscriptions, and invoices — with the metrics that matter, live.
          cta_text: Start free
          cta_href: /signup
          secondary_text: See pricing
          secondary_href: /pricing
      - kind: section
        props:
          heading: Everything you need to run revenue
          eyebrow: Why Meridian
        children:
          - kind: card
            props:
              heading: Live MRR & churn
              text: Watch monthly recurring revenue, growth, and churn update as customers sign up and pay.
          - kind: card
            props:
              heading: Subscriptions that flow
              text: Trialing, active, past-due, canceled — drive the whole lifecycle from one screen.
          - kind: card
            props:
              heading: Invoices, handled
              text: Open, paid, void — track every invoice and mark them paid in a click.
      - kind: section
        props:
          heading: Simple, honest pricing
          eyebrow: Pricing
        children:
          - kind: link_button
            props:
              label: Compare plans
              href: /pricing
              variant: primary

  - name: pricing
    route: /pricing
    layout: marketing
    title: Pricing
    description: Plans for teams of every size.
    body:
      - kind: page_header
        props:
          title: Pricing
          subtitle: Start free. Upgrade when revenue does.
      - kind: pricing
        props:
          plans:
            - name: Starter
              price: "$29"
              period: /mo
              description: For solo founders finding their first customers.
              features: ["Up to 100 customers", "Core billing & invoices", "Email support"]
              cta_text: Start free
              cta_href: /signup
            - name: Pro
              price: "$99"
              period: /mo
              description: For growing teams that live in their revenue.
              featured: true
              features: ["Unlimited customers", "MRR & churn analytics", "Subscription workflows", "Priority support"]
              cta_text: Start free
              cta_href: /signup
            - name: Scale
              price: "$299"
              period: /mo
              description: For high-volume revenue and finance teams.
              features: ["Everything in Pro", "SSO & audit log", "Dedicated success manager", "99.9% uptime SLA"]
              cta_text: Contact sales
              cta_href: /signup

  # ---- About: the plain heading/paragraph content path (readable measure) ----
  - name: about
    route: /about
    layout: marketing
    title: About Meridian
    description: Why we built a calmer billing console.
    body:
      - type: heading
        level: 1
        text: We think billing should feel calm.
      - type: paragraph
        text: Meridian is a demonstration product built entirely from a GoFastr blueprint — a single declarative file that generates this marketing site, the authenticated console, auth, roles, and an admin back-office, all server-rendered.
      - type: paragraph
        text: It exists to show that a framework can generate a real, polished web application — not a CRUD scaffold.

  # ---- Terms + Privacy: the markdown content path (rich long-form prose) ------
  - name: terms
    route: /terms
    layout: marketing
    title: Terms of Service
    body:
      - kind: markdown
        text: "# Terms of Service\n\nThis is a demonstration application. The text below is placeholder content that shows long-form, **readable** typography rendered from Markdown in the marketing layout.\n\n## Acceptance\n\nBy using Meridian you agree these terms are illustrative only — there is no real service, billing, or obligation.\n\n## Use of the service\n\n- Evaluate Meridian freely for any purpose.\n- Sample data is reset periodically without notice.\n- Don't rely on it for anything that matters.\n\n## Liability\n\nMeridian is provided *as-is*, without warranty of any kind."

  - name: privacy
    route: /privacy
    layout: marketing
    title: Privacy Policy
    body:
      - kind: markdown
        text: "# Privacy Policy\n\nMeridian is a demo and stores only the sample data you create while exploring it. The content below is placeholder Markdown.\n\n## What we collect\n\nNothing personal. A demo account and any records you add in the console — all reset periodically.\n\n## What we share\n\nNothing. There are no third parties, trackers, or analytics in this demonstration app."

  # ---- Auth ------------------------------------------------------------------
  - name: login
    route: /login
    layout: marketing
    title: Sign in
    body:
      - kind: login_form
        text: Sign in to Meridian
        props:
          action: /auth/login
          next: /app
          register_href: /signup

  - name: signup
    route: /signup
    layout: marketing
    title: Create your account
    body:
      - kind: signup_form
        text: Create your Meridian account
        props:
          action: /auth/register
          next: /app
          login_href: /login

  # ---- App (authenticated, RBAC-gated) --------------------------------------
  - name: dashboard
    route: /app
    layout: app
    access:
      auth: true
    title: Overview
    description: Your revenue at a glance.
    body:
      - kind: page_header
        props:
          title: Overview
          subtitle: Revenue at a glance
      - kind: stat_row
        children:
          - kind: stat_card
            props:
              label: MRR
              # Real MRR: summed from ACTIVE subscriptions, not a stored column.
              source:
                entity: subscriptions
                agg: sum
                field: mrr
                filter: status=active
              format: money
          - kind: stat_card
            props:
              label: Active customers
              source:
                entity: customers
                agg: count
                filter: status=active
          - kind: stat_card
            props:
              label: Past-due invoices
              source:
                entity: invoices
                agg: count
                filter: status=past_due
          - kind: stat_card
            props:
              label: Plans
              source:
                entity: plans
                agg: count
      - kind: bar_chart
        props:
          title: Customers by status
          source:
            entity: customers
            group_by: status
      - kind: entity_list
        entity: invoices
        text: Recent invoices
        fields: [number, customer_id, amount, status, due_on]
        limit: 8
        empty_text: No invoices yet.

  - name: customers
    route: /app/customers
    layout: app
    access:
      auth: true
    title: Customers
    body:
      - kind: entity_list
        entity: customers
        text: Customers
        fields: [name, email, company, status, mrr]
        search: name
        filters: [status]
        limit: 25
        create: true
        empty_text: No customers yet — add your first to get started.

  - name: customer_detail
    route: /app/customers/{id}
    layout: app
    access:
      auth: true
    title: Customer
    body:
      - kind: entity_detail
        entity: customers

  - name: invoices
    route: /app/invoices
    layout: app
    access:
      auth: true
    title: Invoices
    body:
      - kind: entity_list
        entity: invoices
        text: Invoices
        fields: [number, customer_id, amount, status, issued_on, due_on]
        search: number
        filters: [status, customer_id]
        limit: 25
        create: true
        empty_text: No invoices yet.

  - name: invoice_detail
    route: /app/invoices/{id}
    layout: app
    access:
      auth: true
    title: Invoice
    body:
      - kind: entity_detail
        entity: invoices
        transitions:
          - label: Mark paid
            status: paid
            variant: primary
            stamp: paid_on
          - label: Void
            status: void
            variant: danger

  - name: subscriptions
    route: /app/subscriptions
    layout: app
    access:
      auth: true
    title: Subscriptions
    body:
      - kind: entity_list
        entity: subscriptions
        text: Subscriptions
        fields: [customer_id, plan_id, status, mrr, renews_on]
        limit: 25
        create: true
        empty_text: No subscriptions yet.

  - name: subscription_detail
    route: /app/subscriptions/{id}
    layout: app
    access:
      auth: true
    title: Subscription
    body:
      - kind: entity_detail
        entity: subscriptions
        transitions:
          - label: Activate
            status: active
            variant: primary
          - label: Cancel
            status: canceled
            variant: danger

# =============================================================================
# NAV — marketing header/footer + app sidebar
# =============================================================================

nav:
  - label: Overview
    href: /app
  - label: Customers
    href: /app/customers
  - label: Subscriptions
    href: /app/subscriptions
  - label: Invoices
    href: /app/invoices
  - label: Admin
    href: /admin
    role: admin          # only signed-in admins see this link

