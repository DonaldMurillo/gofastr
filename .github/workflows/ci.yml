name: CI

# Two jobs, split by runtime profile (history: CI runs
# 27100756725..27161715772, June 2026):
#
#   1. `test` (BLOCKING) — build + vet + every package that produced
#      deterministic results on the runners. This is the merge gate.
#
#   2. `browser-e2e` (BLOCKING since 2026-06-10) — the slow chromedp
#      suites, run serialized and isolated:
#        - examples/site, including the axe gate in its own isolated
#          invocation (it flakes when sharing a go-test run with the
#          other chromedp tests — CLAUDE.md).
#        - cmd/gofastr TestBlueprintCLIGeneratesEntireWorkingAppE2E
#          ("chrome failed to start" under parallel load when it ran
#          inside the blocking job, 3/6 runs — serialized here).
#        - kiln/integration: chromedp-heavy, grouped here per
#          CLAUDE.md's slow-suite guidance.
#      This job was continue-on-error while TestAxe_AllPagesAreClean
#      failed 6/6 on Linux runners. Root cause: Linux Chrome defaults
#      to prefers-color-scheme: light, so CI audited the site's LIGHT
#      palette while macOS dev machines (Dark appearance) only ever
#      audited the dark one — the light-scheme colors genuinely failed
#      WCAG AA. Fixed 2026-06-10: light tokens retoned (examples/site
#      + core-ui status tones) and the axe test now forces BOTH schemes
#      per page, so the scan is platform-independent. If the
#      ERR_NETWORK_CHANGED runner flake (5/6 runs, June 2026) resurges,
#      rerun the job before reaching for continue-on-error.
#
# Docker is preinstalled on ubuntu-latest (testcontainers spins up
# Postgres automatically). Chrome is installed in both jobs: several
# blocking packages (framework, framework/uihost, core-ui/runtime,
# examples/backoffice) run chromedp tests that have been stable on CI.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build · vet · test (blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CGO_ENABLED: "1" # mattn/go-sqlite3 requires cgo
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Chrome (stable chromedp suites run here too)
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce # v1
        with:
          install-dependencies: true

      - name: Install bubblewrap (linux sandbox backend + P1-P7 probes)
        # The process-module SandboxRunner (framework) shells to `bwrap` for
        # the linux confinement backend; without it the conformance-probe
        # tests skip (fail-closed "backend unavailable") and that backend's
        # code goes uncovered in the coverage-floors gate. Installing it lets
        # the probes actually run. If unprivileged user namespaces are
        # restricted on the runner the probes still skip cleanly — never fail.
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Install the gofastr binary
        # cmd/gofastr e2e tests (migrate diff/generate, blueprint) skip
        # silently when the binary is absent — install it so they run.
        run: go install ./cmd/gofastr

      - name: Build
        run: go build ./...

      - name: gofmt (tracked files must be clean)
        run: |
          drift=$(git ls-files '*.go' | xargs gofmt -l)
          if [ -n "$drift" ]; then
            echo "gofmt drift in:"; echo "$drift"; exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test (deterministic packages)
        # -timeout=20m, -p 2 to keep httptest/chromedp sockets off the
        # ephemeral-port ceiling. Intentionally NO -count=1: Go's
        # content-addressed test cache (persisted across runs by
        # setup-go's GOCACHE) then skips re-executing any package whose
        # sources + transitive deps + test inputs are byte-identical to a
        # prior PASS — the free, correct-by-construction analog of Nx's
        # affected/cache. Do NOT re-add -count=1 here to "force fresh
        # runs"; the flaky chromedp suites keep it in browser-e2e, which
        # is where forcing a fresh run per push actually matters.
        # Excluded here and run in browser-e2e instead:
        #   - examples/site, kiln/integration, core-ui/runtime,
        #     core-ui/widget (whole packages — the latter two host the
        #     hydration chromedp suites and are documented flaky under
        #     parallel package load; see CLAUDE.md)
        #   - examples/meridian (the 16-surface visual canary exhausts its
        #     bounded 12s capture attempts when another chromedp suite runs
        #     beside it under -p 2 — the exact starvation class the other
        #     exclusions document)
        #   - evals/ui-quality/internal/evalrunner (its capture tests drive
        #     a real headless Chrome; same class)
        #   - cmd/gofastr browser tests via -skip (the rest of the
        #     package stays blocking). These drive a real Chrome over a
        #     livereload websocket; under -p 2 with every other package
        #     they contend for Chrome/sockets and the websocket connect
        #     times out. They run serialized in browser-e2e instead.
        run: |
          # shellcheck disable=SC2046  # word splitting of go list output is intended
          go test -timeout=20m -p 2 \
            -skip 'TestBlueprintCLIGeneratesEntireWorkingAppE2E|TestE2E_HotReload_BrowserAutoRefreshes|TestLivereloadSameBuildIDDoesNotReload' \
            $(go list ./... | grep -vE 'gofastr/(examples/site|examples/meridian|kiln/integration|core-ui/runtime|core-ui/widget|evals/ui-quality/internal/evalrunner)$')

      - name: Coverage floors (claimed packages)
        # Re-runs `go test -cover` for only the floor-gated packages and
        # fails if any drops below its floor (~2 points under the recorded
        # value). Floor table + exclusions live in the script.
        run: bash scripts/coverage-floors.sh

  browser-e2e:
    name: "browser e2e (blocking)"
    runs-on: ubuntu-latest
    # Per-step go-test timeouts sum to 105m (15+15+15+25+10+10+10+5); the
    # job budget must exceed that so the !cancelled() always-report steps
    # can run.
    timeout-minutes: 110
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Chrome
        uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce # v1
        with:
          install-dependencies: true

      - name: Install the gofastr binary
        run: go install ./cmd/gofastr

      # Each suite gets its own serialized `go test` invocation:
      # CLAUDE.md documents that the axe suite flakes when sharing a
      # go-test run with the other chromedp tests, and the suites
      # contend for Chrome/network resources when parallel.

      - name: examples/site e2e (without axe)
        run: go test -count=1 -timeout=15m -skip 'TestAxe' ./examples/site/

      - name: examples/site axe (isolated)
        # 15m, not 10 — the gate scans every page under BOTH color
        # schemes (≈3.5min locally; CI runners are slower).
        if: ${{ !cancelled() }}
        run: go test -count=1 -timeout=15m -run 'TestAxe_AllPagesAreClean' ./examples/site/

      - name: kiln/integration
        if: ${{ !cancelled() }}
        run: go test -count=1 -timeout=15m ./kiln/integration/

      - name: cmd/gofastr browser e2e (blueprint + dev livereload)
        if: ${{ !cancelled() }}
        # Serialized, isolated run of every cmd/gofastr test that drives a
        # real Chrome — the blueprint app E2E plus the two dev livereload
        # browser tests. Kept out of the deterministic step so the
        # websocket connect isn't starved by parallel package load.
        run: go test -count=1 -timeout=10m -run 'TestBlueprintCLIGeneratesEntireWorkingAppE2E|TestE2E_HotReload_BrowserAutoRefreshes|TestLivereloadSameBuildIDDoesNotReload' ./cmd/gofastr/

      - name: core-ui/runtime e2e (isolated)
        if: ${{ !cancelled() }}
        # The runtime hydration suite launches a real Chrome per test
        # binary; under the deterministic job's -p 2 package parallelism
        # the chromedp websocket connect starves and times out
        # ("websocket url timeout reached" — CLAUDE.md documents this
        # package as flaky under parallel load, run isolated).
        run: go test -count=1 -timeout=10m ./core-ui/runtime/

      - name: core-ui/widget e2e (isolated)
        if: ${{ !cancelled() }}
        # Same class as core-ui/runtime — documented flaky when sharing
        # a go-test run with other chromedp suites.
        run: go test -count=1 -timeout=5m ./core-ui/widget/

      - name: examples/meridian visual canary (isolated)
        if: ${{ !cancelled() }}
        # The 16-surface rendered canary (desktop/mobile × light/dark ×
        # marketing/auth/app/admin) captures in software on the two-core
        # runner: bounded 30s attempts × up to 6 retries per surface need a
        # budget well past the local ~2m runtime.
        run: go test -count=1 -timeout=25m ./examples/meridian/

      - name: evals/ui-quality evalrunner (isolated)
        if: ${{ !cancelled() }}
        # Its capture tests drive a real headless Chrome; kept out of the
        # deterministic -p 2 run for the same contention reason.
        run: go test -count=1 -timeout=10m ./evals/ui-quality/...
