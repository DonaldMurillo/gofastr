# Deploys a native static export of the docs site (examples/site) to GitHub Pages.
#
# The site is an SSR-first GoFastr app. Rather than crawling a running
# server with wget (the old approach, which baked "?v=<hash>" into split
# runtime-module filenames and 404'd every module on the static host —
# silently killing all client interactivity), `site --export` renders
# every declared route in-process and dumps all /__gofastr assets with
# query-free filenames. See framework/static.Builder + framework.App.ExportStatic.
#
# Client-only widgets (theme toggle, copy, client-side tabs) work on the
# static export. Server-backed islands (RPC widgets, SSE, live search)
# need the Go server and are out of scope here; full-fidelity hosting
# (Fly/Render/Cloud Run) remains the upgrade path for those.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Need the tag history so the build can stamp the displayed version
          # from `git describe` (default shallow checkout fetches no tags).
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build the docs site
        # Stamp siteVersion from the deployment's latest tag so the live site
        # matches the release instead of a hand-bumped constant.
        run: |
          VER=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//')
          LDFLAGS=""
          [ -n "$VER" ] && LDFLAGS="-ldflags=-X=main.siteVersion=$VER"
          echo "building site as version: ${VER:-dev}"
          go build $LDFLAGS -o /tmp/site ./examples/site/

      - name: Export static site
        # Native, declaration-driven SSG: render every route in-process and
        # dump all /__gofastr assets (runtime.js, split runtime modules,
        # color-scheme.js, app.css, per-component CSS) with query-free
        # filenames. Replaces the wget mirror, which baked "?v=<hash>" into
        # module filenames and 404'd every split module on the static host,
        # silently killing all client interactivity (theme toggle, palette,
        # copy, widgets). See framework/static.Builder + framework.App.ExportStatic.
        run: |
          # --export-base /gofastr: the site is served from a GitHub Pages
          # project URL (https://donaldmurillo.github.io/gofastr/), so every
          # root-absolute asset/nav URL and the runtime's constructed module
          # URLs must resolve under the /gofastr mount path.
          /tmp/site --export _site --export-base /gofastr
          test -f "_site/index.html" || { echo "export produced no index.html"; exit 1; }
          # __gofastr/ starts with an underscore — Jekyll would drop it.
          touch _site/.nojekyll
          echo "pages: $(find _site -name 'index.html' | wc -l) html files, $(du -sh _site | cut -f1) total"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
